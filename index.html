  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
    }

    /* ── Full-screen background ── */
    body {
      background-color: #000;
      background-image:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.95)),
        url('https://images.pexels.com/photos/7181178/pexels-photo-7181178.jpeg?auto=compress&fit=max&h=1080');
      background-position: 50% 15%;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Centering wrapper ── */
    .page-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 430px;
      padding: 0 20px 40px;
    }

    /* ── Share button (top-right) ── */
    .share-btn-row {
      display: flex;
      justify-content: flex-end;
      padding-top: 16px;
    }

    .share-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: #f3f4f6;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      z-index: 50;
    }
    .share-btn:hover { opacity: 0.7; }
    .share-btn svg { color: #374151; }

    /* ── Banner + avatar block ── */
    .banner-block {
      margin: 0 -20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 16px;
    }

    .banner-img {
      width: 100%;
      aspect-ratio: 2 / 1;
      object-fit: cover;
      display: block;
    }

    .avatar-row {
      display: flex;
      margin-top: -48px;
      padding-left: 20px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid #fffffe;
      object-fit: cover;
      display: block;
    }

    /* ── Profile info ── */
    .profile-info {
      text-align: center;
      margin-top: 12px;
    }

    .profile-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 7vw, 36px);
      color: #fffffe;
      line-height: 1.2;
      padding: 0 20px;
    }

    .profile-bio {
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      font-size: 16px;
      color: #fffffe;
      margin-top: 8px;
      padding: 0 32px;
    }

    /* ── Social icons row ── */
    .social-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      margin-top: 8px;
      gap: 0;
    }

    .social-icons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fffffe;
      text-decoration: none;
      padding: 8px;
      transition: opacity 0.2s;
    }
    .social-icons a:hover { opacity: 0.75; }
    .social-icons svg {
      width: 28px;
      height: 28px;
      fill: #fffffe;
    }

    /* ── Link buttons section ── */
    .links-section {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Pulsing animation for first button */
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(255,255,254,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(255,255,254,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,254,0); }
    }

    .link-btn {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 65px;
      padding: 8px;
      border-radius: 10px;
      background-color: rgb(116, 118, 140);
      color: #fffffe;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      text-decoration: none;
      border: 2px solid #fffffe;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .link-btn:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn.pulse {
      animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
    }

    .link-btn-icon {
      width: 56px;
      min-width: 56px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
    }

    .link-btn-icon img {
      width: 45px;
      height: 45px;
      object-fit: cover;
      border-radius: 10px;
    }

    .link-btn-text {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .link-btn-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      white-space: pre-wrap;
    }

    .link-btn-subtitle {
      font-size: 0.8rem;
      font-weight: 400;
      opacity: 0.85;
      line-height: 1.3;
    }

    /* ── Responsive adjustments ── */
    @media (min-width: 600px) {
      .banner-img {
        border-radius: 8px;
      }
      .share-btn-row {
        padding-top: 64px;
      }
    }
  </style>

  <script>
    // Web Share API – falls back to clipboard copy
    function handleShare() {
      const shareData = {
        title: 'Ramon Bordoni | Consultor de Marketing Digital',
        text: 'Consultor de Marketing Digital | Funis | Tráfego | Copy',
        url: window.location.href,
      };
      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert('Link copiado para a área de transferência!');
        }).catch(() => {
          prompt('Copie o link:', window.location.href);
        });
      }
    }
  </script>
